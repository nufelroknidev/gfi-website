<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 185 56">
  <!-- wheat stalk -->
  <line x1="28" y1="48" x2="28" y2="8" stroke="#1A5C38" stroke-width="2" stroke-linecap="round"/>
  <!-- top grain -->
  <ellipse cx="28" cy="11" rx="4.5" ry="3" fill="#E8B800"/>
  <!-- upper pair -->
  <ellipse cx="22" cy="20" rx="5.5" ry="3" fill="#E8B800" transform="rotate(-35 22 20)"/>
  <ellipse cx="34" cy="20" rx="5.5" ry="3" fill="#E8B800" transform="rotate(35 34 20)"/>
  <!-- mid pair -->
  <ellipse cx="21" cy="29" rx="5.5" ry="3" fill="#E8B800" transform="rotate(-38 21 29)"/>
  <ellipse cx="35" cy="29" rx="5.5" ry="3" fill="#E8B800" transform="rotate(38 35 29)"/>
  <!-- lower pair -->
  <ellipse cx="22" cy="38" rx="5.5" ry="3" fill="#E8B800" transform="rotate(-40 22 38)"/>
  <ellipse cx="34" cy="38" rx="5.5" ry="3" fill="#E8B800" transform="rotate(40 34 38)"/>
  <!-- divider -->
  <line x1="56" y1="10" x2="56" y2="46" stroke="#E5E7EB" stroke-width="1"/>
  <!-- GFI wordmark -->
  <text x="68" y="33" font-family="DM Sans, Arial Black, sans-serif" font-weight="800" font-size="26" fill="#1A5C38" letter-spacing="-0.5">GFI</text>
  <!-- subtext -->
  <text x="69" y="47" font-family="DM Sans, Arial, sans-serif" font-weight="500" font-size="9" fill="#6B7280" letter-spacing="2.5">FOOD INDUSTRY</text>
</svg>
