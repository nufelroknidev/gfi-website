<div class="topbar">
    <div class="container">

        <div class="topbar-contact">
            <a href="tel:{{ SITE_SETTINGS.phone_dialable }}" class="topbar-link" data-brand="phone" aria-label="Call {{ SITE_SETTINGS.phone }}">
                <i class="bi bi-telephone-fill"></i>
                <span class="topbar-label">Make a Call: </span><span class="topbar-value">{{ SITE_SETTINGS.phone }}</span>
            </a>
            <span class="topbar-sep">|</span>
            <a href="mailto:{{ SITE_SETTINGS.email }}" class="topbar-link" data-brand="email" aria-label="Email {{ SITE_SETTINGS.email }}">
                <i class="bi bi-envelope-fill"></i>
                <span class="topbar-label">Get an Estimate: </span><span class="topbar-value">{{ SITE_SETTINGS.email }}</span>
            </a>
        </div>

        <div class="topbar-social ms-auto d-flex align-items-center">
            {% include "includes/social_icons.html" with link_class="topbar-social-link" %}
        </div>

    </div>
</div>
