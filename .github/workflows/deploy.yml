name: Deploy to EC2

on:
  push:
    branches:
      - deploy/aws

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install

      - name: Run tests
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          ALLOWED_HOSTS: localhost
        run: poetry run python manage.py test apps.pages apps.products apps.contact apps.news

  deploy:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /home/ubuntu/gfi-website
            git pull
            /home/ubuntu/.local/bin/poetry install --only main
            /home/ubuntu/.local/bin/poetry run python manage.py migrate --settings=config.settings.production
            /home/ubuntu/.local/bin/poetry run python manage.py collectstatic --noinput --settings=config.settings.production
            sudo systemctl restart gunicorn
